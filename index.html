<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スマブラ風対戦格闘ゲーム</title>
<style>
    body {
        margin: 0;
        background-color: #1a1a1a;
        color: #fff;
        font-family: 'Helvetica Neue', Arial, sans-serif;
        text-align: center;
        user-select: none;
    }
    h1, h2 { margin: 10px; color: #ffcc00; }
    .screen { display: none; padding: 20px; }
    .active { display: block; }
    
    #start-screen {
        max-width: 600px;
        margin: 50px auto;
        background: #2a2a2a;
        border: 2px solid #555;
        border-radius: 10px;
        padding: 30px;
    }
    input[type="number"] {
        font-size: 20px;
        width: 70px;
        padding: 5px;
        text-align: center;
        border-radius: 5px;
        border: none;
    }
    button {
        font-size: 20px;
        padding: 10px 30px;
        background: #ff5500;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
        transition: 0.2s;
    }
    button:hover { background: #ff7722; }
    
    canvas {
        background: #333344;
        display: block;
        margin: 10px auto;
        border: 4px solid #444;
        box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }
    .controls-table {
        width: 100%;
        margin-top: 20px;
        border-collapse: collapse;
        font-size: 14px;
    }
    .controls-table th, .controls-table td {
        border: 1px solid #555;
        padding: 8px;
        text-align: left;
    }
    .controls-table th { background: #444; }
</style>
</head>
<body>

    <div id="start-screen" class="screen active">
        <h1>Platform Fighter</h1>
        <p>試合開始前の残機（ストック）設定：</p>
        <input type="number" id="stock-input" value="3" min="1" max="99"> ストック<br><br>
        <button id="start-btn">試合開始</button>
        
        <h3>【操作説明】</h3>
        <table class="controls-table">
            <tr>
                <th>アクション</th>
                <th>Player 1 (赤)</th>
                <th>Player 2 (青)</th>
            </tr>
            <tr>
                <td>移動 / 各種方向指定</td>
                <td><b>A</b> (左) / <b>D</b> (右) / <b>W</b> (上) / <b>S</b> (下)</td>
                <td><b>◀</b> (左) / <b>▶</b> (右) / <b>▲</b> (上) / <b>▼</b> (下)</td>
            </tr>
            <tr>
                <td>ジャンプ (2回まで)</td>
                <td><b>Space</b> (スペース)</td>
                <td><b>/</b> (スラッシュ)</td>
            </tr>
            <tr>
                <td>強攻撃 (各方向あり)</td>
                <td><b>F</b></td>
                <td><b>I</b></td>
            </tr>
            <tr>
                <td>スマッシュ (各方向あり)</td>
                <td><b>G</b></td>
                <td><b>O</b></td>
            </tr>
            <tr>
                <td>必殺技 (各方向あり)</td>
                <td><b>H</b> (上Bで復帰上昇)</td>
                <td><b>P</b> (上Bで復帰上昇)</td>
            </tr>
        </table>
    </div>

    <div id="game-screen" class="screen">
        <canvas id="gameCanvas" width="900" height="600"></canvas>
    </div>

    <div id="end-screen" class="screen" style="margin-top: 100px;">
        <h2 id="winner-text">GAME OVER</h2>
        <br>
        <button id="retry-btn">タイトルへ戻る</button>
    </div>

<script>
// --- 技のデータ設定 ---
// damage: ダメージ%, bkb: 基本吹っ飛び, kbg: 吹っ飛び成長率, angle: 飛ばす角度(度数法), size: 攻撃判定サイズ, offset: 発生位置
const moves = {
    tilt: { // 強攻撃
        neutral: { damage: 4, bkb: 6, kbg: 0.1, angle: 45, size: {w: 50, h: 40}, offset: {x: 25, y: -10}, duration: 20, hitStart: 5, hitEnd: 12 },
        up:      { damage: 5, bkb: 7, kbg: 0.08, angle: 85, size: {w: 40, h: 60}, offset: {x: -5, y: -50}, duration: 22, hitStart: 6, hitEnd: 14 },
        down:    { damage: 6, bkb: 5, kbg: 0.08, angle: 30, size: {w: 55, h: 30}, offset: {x: 20, y: 20}, duration: 20, hitStart: 5, hitEnd: 11 },
        side:    { damage: 7, bkb: 6, kbg: 0.12, angle: 35, size: {w: 60, h: 40}, offset: {x: 30, y: -10}, duration: 25, hitStart: 7, hitEnd: 15 }
    },
    smash: { // スマッシュ
        neutral: { damage: 13, bkb: 10, kbg: 0.22, angle: 40, size: {w: 65, h: 65}, offset: {x: 25, y: -20}, duration: 35, hitStart: 12, hitEnd: 20 },
        up:      { damage: 15, bkb: 12, kbg: 0.24, angle: 90, size: {w: 55, h: 80}, offset: {x: -12, y: -65}, duration: 40, hitStart: 14, hitEnd: 22 },
        down:    { damage: 12, bkb: 9, kbg: 0.18, angle: 20, size: {w: 80, h: 30}, offset: {x: -25, y: 25}, duration: 32, hitStart: 10, hitEnd: 18 },
        side:    { damage: 17, bkb: 13, kbg: 0.26, angle: 25, size: {w: 85, h: 50}, offset: {x: 30, y: -15}, duration: 45, hitStart: 16, hitEnd: 25 }
    },
    special: { // 必殺技
        neutral: { damage: 8, bkb: 8, kbg: 0.15, angle: 45, size: {w: 55, h: 40}, offset: {x: 25, y: -10}, duration: 28, hitStart: 8, hitEnd: 16 },
        up:      { damage: 6, bkb: 14, kbg: 0.05, angle: 80, size: {w: 50, h: 60}, offset: {x: -10, y: -45}, duration: 35, hitStart: 4, hitEnd: 18 }, // 復帰技
        down:    { damage: 10, bkb: 8, kbg: 0.16, angle: 60, size: {w: 70, h: 60}, offset: {x: -20, y: 0}, duration: 30, hitStart: 7, hitEnd: 17 },
        side:    { damage: 11, bkb: 9, kbg: 0.18, angle: 35, size: {w: 75, h: 40}, offset: {x: 35, y: -10}, duration: 35, hitStart: 10, hitEnd: 20 }
    }
};

// --- ゲーム設定と定数 ---
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const GRAVITY = 0.4;
const STAGE = { x: 200, y: 420, w: 500, h: 40 };
const BLAST_ZONE = { left: -100, right: 1000, top: -100, bottom: 700 };

let keys = {};
let keysPressed = {};
let p1, p2;
let particles = [];
let gameActive = false;
let gameLoopId;

// キーボード入力監視
window.addEventListener('keydown', e => {
    if (!keys[e.code]) keysPressed[e.code] = true;
    keys[e.code] = true;
    if(['Space', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.code)) e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

function clearPressedKeys() { keysPressed = {}; }

// --- プレイヤー クラス ---
class Player {
    constructor(x, y, color, controls, id) {
        this.id = id;
        this.startX = x;
        this.startY = y;
        this.x = x;
        this.y = y;
        this.vx = 0;
        this.vy = 0;
        this.width = 35;
        this.height = 50;
        this.color = color;
        this.controls = controls;
        
        this.percentage = 0;
        this.stocks = 3;
        this.facing = id === 1 ? 1 : -1;
        this.isGrounded = false;
        this.jumpCount = 0;
        
        this.state = 'idle'; // 'idle', 'attack', 'hitstun'
        this.stateTimer = 0;
        this.currentMove = null;
        this.hasHit = false;
    }

    update() {
        // 重力の適用
        if (!this.isGrounded) {
            this.vy += GRAVITY;
            if (this.vy > 15) this.vy = 15;
        }

        // 摩擦と空気抵抗
        if (this.state === 'hitstun') {
            this.vx *= 0.97;
            this.vy *= 0.97;
        } else {
            if (this.isGrounded) this.vx *= 0.75;
            else this.vx *= 0.88;
        }

        // 位置の更新
        this.x += this.vx;
        this.y += this.vy;

        // タイマー制御
        if (this.stateTimer > 0) {
            this.stateTimer--;
            if (this.stateTimer === 0) {
                this.state = 'idle';
                this.currentMove = null;
            }
        }

        // 地上判定のリセット（毎フレーム衝突判定の前にリセット）
        this.isGrounded = false;

        if (this.state !== 'hitstun') {
            this.handleInput();
        }
    }

    handleInput() {
        // 左右移動（攻撃中は移動不可）
        if (this.state !== 'attack') {
            if (keys[this.controls.left]) {
                this.vx = -4.5;
                this.facing = -1;
            }
            if (keys[this.controls.right]) {
                this.vx = 4.5;
                this.facing = 1;
            }
        }

        // ジャンプ（空中2段ジャンプまで可能）
        if (keysPressed[this.controls.jump]) {
            if (this.isGrounded) {
                this.vy = -11;
                this.jumpCount = 1;
            } else if (this.jumpCount < 2) {
                this.vy = -10;
                this.jumpCount = 2;
            }
        }

        // 攻撃ボタンの受付
        if (this.state !== 'attack') {
            if (keysPressed[this.controls.tilt]) this.initiateAttack('tilt');
            else if (keysPressed[this.controls.smash]) this.initiateAttack('smash');
            else if (keysPressed[this.controls.special]) this.initiateAttack('special');
        }
    }

    initiateAttack(type) {
        // 方向の判定
        let dir = 'neutral';
        if (keys[this.controls.up]) dir = 'up';
        else if (keys[this.controls.down]) dir = 'down';
        else if (keys[this.controls.left] || keys[this.controls.right]) dir = 'side';

        const move = moves[type][dir];
        this.state = 'attack';
        this.currentMove = move;
        this.stateTimer = move.duration;
        this.hasHit = false;

        // 【特殊挙団】上B（復帰技）なら上方向へ急加速
        if (type === 'special' && dir === 'up') {
            this.vy = -13;
            this.vx = this.facing * 2.5;
        }
        // 【特殊挙動】横スマッシュなら少し前進
        if (type === 'smash' && dir === 'side') {
            this.vx = this.facing * 4;
        }
    }

    draw() {
        ctx.save();
        
        // 状態に応じたカラーチェンジ
        if (this.state === 'hitstun') {
            ctx.fillStyle = '#ffaa00'; // 吹っ飛び中はオレンジ
            // 吹っ飛び中の回転表現
            ctx.translate(this.x + this.width/2, this.y + this.height/2);
            ctx.rotate((this.vx * 0.05));
            ctx.translate(-(this.x + this.width/2), -(this.y + this.height/2));
        } else if (this.state === 'attack') {
            ctx.fillStyle = '#ffffff'; // 攻撃中は一瞬白っぽく
        } else {
            ctx.fillStyle = this.color;
        }

        // 本体描画
        ctx.fillRect(this.x, this.y, this.width, this.height);
        
        // 目の描画（向いている方向がわかるように）
        ctx.fillStyle = '#000';
        let eyeX = this.facing === 1 ? this.x + this.width - 10 : this.x + 4;
        ctx.fillRect(eyeX, this.y + 10, 6, 6);
        
        ctx.restore();

        // 攻撃判定（Hitbox）の描画
        if (this.state === 'attack' && this.currentMove) {
            const start = this.currentMove.duration - this.currentMove.hitEnd;
            const end = this.currentMove.duration - this.currentMove.hitStart;
            // 現在のフレームが持続時間内なら赤透明の枠を表示
            if (this.stateTimer >= start && this.stateTimer <= end) {
                const hb = this.getHitbox();
                ctx.fillStyle = 'rgba(255, 0, 0, 0.4)';
                ctx.fillRect(hb.x, hb.y, hb.w, hb.h);
            }
        }
    }

    getHitbox() {
        if (!this.currentMove) return null;
        const move = this.currentMove;
        // プレイヤーの向きに合わせて攻撃位置のオフセットを反転
        const ox = this.facing === 1 ? move.offset.x : -move.offset.x - move.size.w;
        return {
            x: this.x + this.width/2 + ox,
            y: this.y + this.height/2 + move.offset.y,
            w: move.size.w,
            h: move.size.h
        };
    }
}

// --- 衝突・ゲームロジック ---

function checkStageCollision(p) {
    // プレイヤーの前フレームの足元の位置を大まかに計算（すり抜け床判定用）
    const prevBottom = p.y + p.height - p.vy;
    
    // ステージの水平範囲内にプレイヤーがいるか
    if (p.x + p.width > STAGE.x && p.x < STAGE.x + STAGE.w) {
        // 上から下に落ちてきて、足元がステージ床を通過した瞬間
        if (prevBottom <= STAGE.y + 5 && p.y + p.height >= STAGE.y && p.vy >= 0) {
            p.y = STAGE.y - p.height;
            p.vy = 0;
            p.isGrounded = true;
            p.jumpCount = 0;
        }
    }
}

function checkAttackCollision(attacker, defender) {
    if (attacker.state !== 'attack' || !attacker.currentMove || attacker.hasHit) return;
    
    // 技のヒット受付フレームかチェック
    const move = attacker.currentMove;
    const start = move.duration - move.hitEnd;
    const end = move.duration - move.hitStart;
    if (attacker.stateTimer < start || attacker.stateTimer > end) return;

    const hb = attacker.getHitbox();
    if (!hb) return;

    // 矩形同士の当たり判定
    if (hb.x < defender.x + defender.width &&
        hb.x + hb.w > defender.x &&
        hb.y < defender.y + defender.height &&
        hb.y + hb.h > defender.y) {
        
        // ヒット成立
        attacker.hasHit = true;
        defender.percentage += move.damage;

        // スマブラ風吹っ飛び計算式 (基本値 + 蓄積%による成長)
        const kbPower = move.bkb + (defender.percentage * move.kbg);
        const rad = (move.angle * Math.PI) / 180;

        // 攻撃者の向きに基づいてベクトル方向を決定
        defender.vx = Math.cos(rad) * kbPower * attacker.facing;
        defender.vy = -Math.sin(rad) * kbPower; // Y軸は上がマイナス

        // 被弾硬直状態へ
        defender.state = 'hitstun';
        defender.stateTimer = Math.max(20, Math.floor(kbPower * 2.2)); // 最低20フレーム硬直
        
        // エフェクト生成
        createHitEffect(defender.x + defender.width/2, defender.y + defender.height/2, kbPower);
    }
}

function checkBurst(p) {
    if (p.x < BLAST_ZONE.left || p.x > BLAST_ZONE.right || p.y < BLAST_ZONE.top || p.y > BLAST_ZONE.bottom) {
        p.stocks--;
        createBurstEffect(Math.max(10, Math.min(canvas.width-10, p.x)), Math.max(10, Math.min(canvas.height-10, p.y)));
        
        if (p.stocks <= 0) {
            endGame();
        } else {
            // リスポーン（復活）処理
            p.x = p.startX;
            p.y = p.startY;
            p.vx = 0;
            p.vy = 0;
            p.percentage = 0;
            p.state = 'idle';
            p.stateTimer = 0;
            p.currentMove = null;
        }
    }
}

// --- エフェクト処理 ---
function createHitEffect(x, y, power) {
    for (let i = 0; i < power * 1.5; i++) {
        particles.push({
            x: x, y: y,
            vx: (Math.random() - 0.5) * power * 0.6,
            vy: (Math.random() - 0.5) * power * 0.6,
            size: Math.random() * 4 + 2,
            color: '#ffcc00',
            life: 25
        });
    }
}

function createBurstEffect(x, y) {
    for (let i = 0; i < 40; i++) {
        particles.push({
            x: x, y: y,
            vx: (Math.random() - 0.5) * 16,
            vy: (Math.random() - 0.5) * 16,
            size: Math.random() * 8 + 4,
            color: '#ff3300',
            life: 45
        });
    }
}

function updateParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.life--;
        if (p.life <= 0) particles.splice(i, 1);
    }
}

function drawParticles() {
    particles.forEach(p => {
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
    });
}

// --- 画面描画 ---
function drawUI() {
    // 共通テキスト設定
    ctx.font = 'bold 22px sans-serif';
    
    // Player 1 (左下)
    ctx.fillStyle = '#ff4444';
    ctx.fillText("Player 1", 150, 510);
    ctx.font = 'bold 45px sans-serif';
    ctx.fillText(`${p1.percentage}%`, 150, 555);
    ctx.font = '24px sans-serif';
    ctx.fillText("●".repeat(p1.stocks), 150, 585);

    // Player 2 (右下)
    ctx.font = 'bold 22px sans-serif';
    ctx.fillStyle = '#4444ff';
    ctx.fillText("Player 2", 750, 510);
    ctx.font = 'bold 45px sans-serif';
    ctx.fillText(`${p2.percentage}%`, 750, 555);
    ctx.font = '24px sans-serif';
    ctx.fillText("●".repeat(p2.stocks), 750, 585);
}

function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 背景グリッド風（空間の広さを出すため）
    ctx.strokeStyle = '#3d3d55';
    ctx.lineWidth = 1;
    for(let i=0; i<canvas.width; i+=100) {
        ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
    }
    for(let j=0; j<canvas.height; j+=100) {
        ctx.beginPath(); ctx.moveTo(0, j); ctx.lineTo(canvas.width, j); ctx.stroke();
    }

    // ステージ（足場）
    ctx.fillStyle = '#666';
    ctx.fillRect(STAGE.x, STAGE.y, STAGE.w, STAGE.h);
    ctx.fillStyle = '#888'; // 表面のハイライト
    ctx.fillRect(STAGE.x, STAGE.y, STAGE.w, 6);

    // キャラクター
    p1.draw();
    p2.draw();

    // エフェクト
    drawParticles();

    // UI (%と残機)
    drawUI();
}

// --- メインループ・シーン管理 ---
function gameLoop() {
    if (!gameActive) return;

    // 1. 各プレイヤーの物理・入力処理
    p1.update();
    p2.update();

    // 2. 地形判定
    checkStageCollision(p1);
    checkStageCollision(p2);

    // 3. 攻撃判定のぶつかり合いチェック
    checkAttackCollision(p1, p2);
    checkAttackCollision(p2, p1);

    // 4. バースト判定
    checkBurst(p1);
    checkBurst(p2);

    // 5. 演出更新
    updateParticles();

    // 6. 画面描画
    render();

    // 1フレーム限りの入力フラグをクリア
    clearPressedKeys();

    gameLoopId = requestAnimationFrame(gameLoop);
}

function initGame(totalStocks) {
    // プレイヤーの初期化 (配置、色、キー配置、ID)
    const p1Controls = { left: 'KeyA', right: 'KeyD', up: 'KeyW', down: 'KeyS', jump: 'Space', tilt: 'KeyF', smash: 'KeyG', special: 'KeyH' };
    const p2Controls = { left: 'ArrowLeft', right: 'ArrowRight', up: 'ArrowUp', down: 'ArrowDown', jump: 'Slash', tilt: 'KeyI', smash: 'KeyO', special: 'KeyP' };

    p1 = new Player(320, 250, '#ff4444', p1Controls, 1);
    p2 = new Player(550, 250, '#4444ff', p2Controls, 2);

    p1.stocks = totalStocks;
    p2.stocks = totalStocks;
    
    particles = [];
    keys = {};
    keysPressed = {};
    
    gameActive = true;
    gameLoop();
}

function endGame() {
    gameActive = false;
    cancelAnimationFrame(gameLoopId);
    
    document.getElementById('game-screen').classList.remove('active');
    document.getElementById('end-screen').classList.add('active');
    
    const winnerText = document.getElementById('winner-text');
    if (p1.stocks <= 0 && p2.stocks <= 0) {
        winnerText.innerText = "DRAW (引き分け)";
    } else if (p1.stocks <= 0) {
        winnerText.innerText = "Player 2 (青) の勝利！";
        winnerText.style.color = '#4444ff';
    } else {
        winnerText.innerText = "Player 1 (赤) の勝利！";
        winnerText.style.color = '#ff4444';
    }
}

// --- イベント登録 ---
document.getElementById('start-btn').addEventListener('click', () => {
    const stockInput = document.getElementById('stock-input').value;
    const stocks = Math.max(1, parseInt(stockInput) || 3);
    
    document.getElementById('start-screen').classList.remove('active');
    document.getElementById('game-screen').classList.add('active');
    initGame(stocks);
});

document.getElementById('retry-btn').addEventListener('click', () => {
    document.getElementById('end-screen').classList.remove('active');
    document.getElementById('start-screen').classList.add('active');
});
</script>
</body>
</html>
